services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: plameli-backend-prod
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-eur}
      STRIPE_PAYMENT_METHOD_TYPES: ${STRIPE_PAYMENT_METHOD_TYPES:-card}
      STRIPE_CHECKOUT_EXPIRES_MINUTES: ${STRIPE_CHECKOUT_EXPIRES_MINUTES:-30}
      STRIPE_CONSULTATION_STANDARD_PRICE_EUR: ${STRIPE_CONSULTATION_STANDARD_PRICE_EUR:-150.00}
      STRIPE_CONSULTATION_PRIORITY_PRICE_EUR: ${STRIPE_CONSULTATION_PRIORITY_PRICE_EUR:-250.00}
      FRONTEND_URL: ${FRONTEND_URL:-https://ledgerlab.tech}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      CONSULTATION_TIMEZONE: ${CONSULTATION_TIMEZONE:-Europe/Sofia}
      CONSULTATION_SLOT_DAYS: ${CONSULTATION_SLOT_DAYS:-1,2,3,4}
      CONSULTATION_SLOT_TIMES: ${CONSULTATION_SLOT_TIMES:-13:00,14:30}
      CONSULTATION_DURATION_MINUTES: ${CONSULTATION_DURATION_MINUTES:-60}
      CONSULTATION_LOOKAHEAD_DAYS: ${CONSULTATION_LOOKAHEAD_DAYS:-30}
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: plameli-frontend-prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://ledgerlab.tech/api}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000/api}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    depends_on:
      - backend
    restart: unless-stopped
