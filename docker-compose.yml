services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: plameli-backend-dev
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-development-only}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      CONSULTATION_TIMEZONE: ${CONSULTATION_TIMEZONE:-Europe/Sofia}
      CONSULTATION_SLOT_DAYS: ${CONSULTATION_SLOT_DAYS:-1,2,3,4}
      CONSULTATION_SLOT_TIMES: ${CONSULTATION_SLOT_TIMES:-13:00,14:30}
      CONSULTATION_DURATION_MINUTES: ${CONSULTATION_DURATION_MINUTES:-60}
      CONSULTATION_LOOKAHEAD_DAYS: ${CONSULTATION_LOOKAHEAD_DAYS:-30}
    volumes:
      - ./backend:/app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: plameli-frontend-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      INTERNAL_API_URL: http://backend:8000/api
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
